<div  class="modal-overlay">
      <div class="modal">
         <app-icon role="button" [iconPath]="xmarkPath" [ngClass]="'small-icon blue'" (click)="closeModal()"></app-icon>

     <form [formGroup]="form"> 
  <label [for]="activeControlName">Elige el color 
    {{ activeModal === 'base' ? 'de la base' : activeModal === 'color' ? 'de las letras' : 'de la luz'  }}:
  </label>
 

<div class="color-picker">
 
  @for(color of material.colors; track i; let i = $index) {
      @if(activeModal === 'color' && color.uses?.includes('letra') || activeModal === 'lightColor' && color.uses?.includes('luz') || activeModal === 'base' && color.uses?.includes('base')) {
        <div class="color-option">
    <input
      type="radio"
      [id]="'activeModal -' + i"
      [formControlName]="activeControlName"
      [value]="color"
      hidden>

    <label
      [for]="'activeModal -' + i"
      class="color-square"
      [style.background]="color.hex"
       ></label>

           <span class="color-legend">{{color.name}}</span>
      </div>
  }
   }
</div>

<div class="modal-buttons">
<button class="button"  type="button" (click)="closeModal()">Aceptar</button>
<button class="button"  type="button" (click)="unselectColor()">Cancelar</button>
</div>
</form>

</div>
</div>
