<div class="image-container">
<img class="card-image" [src]="product.images[0]" [alt]="product.images[0] | alt" />
</div>
<h3 class="product-title centered-text">{{ product.name }}</h3>
 @if(mainVariant) {
   <div>
    <p class="price">{{ mainVariant.price | price }}</p>
    <p class="price-unit">precio por letra y cm de alto</p>
    </div>
    }
