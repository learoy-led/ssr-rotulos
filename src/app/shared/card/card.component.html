<div class="image-container">
<img class="card-image" [src]="product.images[0]" [alt]="product.images[0] | alt" />
</div>
<div class="texts-container">
<h4 class="product-name">{{ product.name }}</h4>
 @if(mainVariant) {
    <p class="price">{{ (product.renderKey === 'neon' ? mainVariant.price : mainVariant.price*10) | price }}</p>
    }
    </div>
