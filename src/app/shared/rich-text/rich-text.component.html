<div class="toolbar">

    <button
  type="button"
  [class.active]="editor && editor.isActive('bold')"
  (click)="editor.chain().focus().toggleBold().run()">
  <svg xmlns="http://www.w3.org/2000/svg"  
  viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
  <path [attr.d]="boldPath"/>
</svg>
</button>

    <button
  type="button"
  [class.active]="editor && editor.isActive('italic')"
  (click)="editor.chain().focus().toggleItalic().run()">
<svg   
xmlns="http://www.w3.org/2000/svg" 
viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
<path [attr.d]="italicPath"/>
</svg>
</button>

  <button
  type="button"
  (click)="editor.chain().focus().toggleBulletList().run()"
   [class.active]="editor && editor.isActive('bulletList')"
   >
  <svg xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
  <path [attr.d]="listPath"/>
</svg>
</button>

</div>

<div #editorElement class="editor"  (blur)="markTouched()"></div>
