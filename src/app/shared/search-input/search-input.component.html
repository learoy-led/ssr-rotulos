<app-icon [iconPath]="searchPath"></app-icon>
  <input
        aria-label="Escribir nombre de producto para buscar"
        class="search-input"
        placeholder="Buscar..."
        type="search"
        id="search"
        name="search"
        #search
        (input)="listenInput($event)"
        (keydown.enter)="submitSearch(search.value)"
      />
