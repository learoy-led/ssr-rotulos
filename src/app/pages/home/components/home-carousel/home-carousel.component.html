    <div class="home-image-container">
    @for(img of imagesSelected; track $index) {
    <img
      class="home-banner-image"
      [src]="img"
      alt="rotulos-personalizados"
      
    />
    }
  </div>

   <div class="home-banner-text">
    <h1 class="home-banner-title">Rótulos personalizados online</h1>
        <h2 class="home-banner-subtitle">
          Letras de
          <span class="word-wrapper">
            @for (word of letras; track $index) {
            <span class="word">
              {{ word }}
            </span>
            }
          </span>
        </h2>
        <p class="home-banner-cta">Encuentra tus letras y personaliza tu rótulo a tu gusto con nuestro simulador. </p>
      
        <app-button
      [buttonText]="'Catálogo'"
      [buttonLink]="'/contacto'"
        [mainButton]="true"
    ></app-button>
  </div>
