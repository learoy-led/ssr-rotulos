    <section class="centered-section">
    <h1 class="title">Modelos de rotulación</h1>
    <h3 class="subtitle blue">Escoge tu estilo</h3>
<app-filter-buttons [filterParam]="'categories'" [itemSelected]="categorySelected" (itemSelectedUpdate)="onCategorySelectedChange($event)"></app-filter-buttons>
@for(category of categories$ | async | filter: categorySelected; track category.name; let i = $index) {
  <div class="category">
      <h2 class="small-title centered-text">{{category.name}}</h2>

      <ul class="products-list">

        @for (product of getProductsInCategory(category.slug) | async ; track product._id) {
        
  <li class="product-card">
      <a [routerLink]="[`/${category?.slug}/${product.slug}`]">
    <app-card [product]="product"></app-card>
</a>
</li>
}
      </ul>
      </div>
}
  

  </section>
</main>
