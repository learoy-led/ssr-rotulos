<main class="centered-main">
      <section class="centered-section cases full-width-section">
      <h1 class="centered-text">Trabajos realizados</h1>
      <ul class="cases-grid">
        @for(case of cases; track case; let i = $index) {
<li class="case-container" 
       ><img (click)="selectCase(i)" class="case-image" [src]="case" [alt]="case | alt"></li>
        }
      </ul>  
      @if(selectedCase) {
<figure class="image-zoom-container">
        <img 
      loading="lazy" decoding="async" class="case-image-zoom blue-shadow" [src]="selectedCase" [alt]="selectedCase | alt">
      <span role="button" class="button xmark" (click)="closeImageZoom()">X</span>
      <!-- <app-icon [iconPath]="xmarkPath"></app-icon> -->
        
</figure>
      }
    </section>
     <app-keywords-animation></app-keywords-animation>
  </main>
