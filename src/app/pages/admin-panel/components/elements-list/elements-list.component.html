<ul class="elements-list">
    <li class="list-element" *ngFor="let element of elements" >
        <img class="list-element-image" [src]="getSrcImage(element)" [alt]="getSrcImage(element) | alt" />

        <div class="list-element-texts">
         <h3 class="list-element-name" >{{ element.name }}</h3>        
          <div class="edit-delete-buttons">           
              <svg role="button" class="edit-delete-button" (click)="openEditElementModal(element)"
              xmlns="http://www.w3.org/2000/svg" 
              aria-hidden="true" viewBox="0 0 640 640">
              <path [attr.d]="pencilPath"></path></svg>
          
              <svg role="button" class="edit-delete-button" (click)="onDeleteElement(element)"
              xmlns="http://www.w3.org/2000/svg" 
              aria-hidden="true" viewBox="0 0 640 640">
              <path [attr.d]="binPath"></path></svg>
          </div>
        </div>
      </li>
    </ul>
