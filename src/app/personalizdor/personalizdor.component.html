  <div class="preview-container">
<figure class="preview-figure">


 <svg
 class="ia-image"
    #svgEl
    [attr.width]="width"
    [attr.height]="height"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur1" />
        <feGaussianBlur stdDeviation="20" result="blur2" />
        <feMerge>
          <feMergeNode in="blur2" />
          <feMergeNode in="blur1" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <image
      [attr.href]="background"
      width="100%"
      height="100%"
      preserveAspectRatio="xMidYMid slice"
    />

   <rect width="100%" height="100%" fill="black" opacity="0.6"></rect>

       <text
      x="50%"
      y="50%"
      text-anchor="middle"
      dominant-baseline="middle"
      [attr.font-size]="fontSize"
      [attr.font-family]="font"
      [attr.fill]="color"
      filter="url(#glow)"
    >
      <tspan
        *ngFor="let line of lines; let i = index"
        x="50%"
        [attr.dy]="i === 0 ? firstDy : lineHeight"
      >
        {{ line }}
      </tspan>
    </text>

    <text
      x="50%"
      y="50%"
      text-anchor="middle"
      dominant-baseline="middle"
      [attr.font-size]="fontSize"
      [attr.font-family]="font"
      [attr.fill]="innerColor"
    >
      <tspan
        *ngFor="let line of lines; let i = index"
        x="50%"
        [attr.dy]="i === 0 ? firstDy : lineHeight"
      >
        {{ line }}
      </tspan>
    </text>
  </svg>

<p class="ia-advice">Esta imagen ha sido generada por IA. El producto real puede variar ligeramente.</p>
</figure>    
</div>
<form  [formGroup]="form"  class="preview-form"> 
  <label for="text">Texto del rótulo:</label> 
     <input
      placeholder="Escribe aquí tu texto"
      class="form-field"
      type="text"
      id="text"
      formControlName="text"
      required
    />
    
    <label for="font">Elige el diseño de letras:</label> 
     <div class="font-picker">
@for(font of materials[0].fonts; track font; let i = $index) {
    <input
      type="radio"
      [id]="'font-' + i"
      formControlName="font"
      [value]="font"
      hidden>

    <label
      [for]="'font-' + i"
      class="font-preview"
      [ngStyle]="{'font-family': font}"
       >{{font}}</label>
  }

     </div>
  
  <label for="color">Selecciona un color:</label> 

  <div class="color-picker">
  @for(color of materials[0].colors; track color; let i = $index) {
    <input
      type="radio"
      [id]="'color-' + i"
      formControlName="color"
      [value]="color"
      hidden>

    <label
      [for]="'color-' + i"
      class="color-circle"
      [style.background]="color"
       ></label>
  }
</div>

<label for="background" class="label">Elige un fondo:</label> 

  <div class="background-picker">
  @for(background of materials[0].backgrounds; track background; let i = $index) {
    <input
      type="radio"
      [id]="'background-' + i"
      formControlName="background"
      [value]="background"
      hidden>

    <label
      [for]="'background-' + i"
      class="background-square"
      [style.background-image]="'url(' + background + ')'"
       ></label>
  }
</div>

<!-- <button class="button secondary-button" type="submit" [disabled]="form.invalid">Añadir al carrito</button> -->
</form>
